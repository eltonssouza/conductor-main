# Conductor RAG stack — Ollama + bge-m3 + ChromaDB + book ingest, all in Docker.
#
# Usage (preferred): `conductor up` / `conductor up -d`. The launcher auto-detects
# the GPU. The book corpus is fetched from the public library repo
# (CONDUCTOR_LIBRARY_REPO@REF) — nothing local is required. Watch progress with
# `docker compose logs -f conductor`.
#
# The `conductor` service runs once: it fetches the books, pulls bge-m3, waits
# for ChromaDB, and ingests — printing the progress of each step. It exits when
# the ingest finishes; ollama + chroma keep running to serve queries.
#
# Ports (localhost only): Ollama 11434, ChromaDB 8001 (8000 is left for Honcho).

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped
    # GPU is auto-enabled by `conductor up` (detects NVIDIA GPU + Docker runtime
    # and adds docker-compose.gpu.yml). CPU ingest is slow.

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma:/data
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "127.0.0.1:8001:8000"
    # No healthcheck: the chromadb/chroma image has no `python`/`curl` on PATH to
    # probe with. The `conductor` service polls Chroma's heartbeat itself before
    # ingesting (see rag/bootstrap.step_chroma), so it waits correctly anyway.
    restart: unless-stopped

  conductor:
    build:
      # Repo root, three levels up from conductor/infra/conductor/.
      context: ../../..
      dockerfile: conductor/infra/conductor/Dockerfile
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
      CONDUCTOR_CHROMA_HTTP: chroma:8000
      CONDUCTOR_LIBRARY: /data/library
      # Corpus is fetched from this public repo at run time (override to point at
      # a fork/branch). For an offline seed, set CONDUCTOR_LIBRARY_ARCHIVE to a
      # mounted .7z instead (see the bootstrap fallback).
      CONDUCTOR_LIBRARY_REPO: ${CONDUCTOR_LIBRARY_REPO:-eltonssouza/conductor-library}
      CONDUCTOR_LIBRARY_REF: ${CONDUCTOR_LIBRARY_REF:-main}
      CONDUCTOR_EMBED_MODEL: bge-m3
    volumes:
      - library:/data/library
    restart: "no"

volumes:
  ollama:
  chroma:
  library:
