name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev tooling
        # Core CLI is pure stdlib; only the dev extra (ruff + mypy) is needed.
        run: python -m pip install -e ".[dev]"

      # --- Gate 1: the 11 template invariants (R1-R11). Hard gate. ---
      - name: Validate invariants (tools/validate.py)
        run: python tools/validate.py

      # --- Gate 2: unit tests (pure stdlib unittest). Hard gate. ---
      - name: Unit tests
        run: python -m unittest discover -s tests

      # --- Gate 3: lint. Hard gate — config is calibrated green on the tree. ---
      - name: Lint (ruff)
        run: ruff check conductor tools tests

      # --- Gate 4: types. Hard gate — lenient baseline, green on the tree.
      # mypy >=2 only targets py>=3.10, so type analysis runs once (not per
      # matrix entry) to avoid a spurious failure on the 3.9 interpreter. ---
      - name: Type check (mypy)
        if: matrix.python-version == '3.12'
        run: mypy conductor
