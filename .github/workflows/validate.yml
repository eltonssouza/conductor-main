name: validate

# Gate 7 (quality gate): every push/PR must pass the invariants + functional tests.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # Pure stdlib (invariants R1–R11 + the unittest suite) — nothing to install.
      - name: Run validator + test suite
        run: python tools/test.py
