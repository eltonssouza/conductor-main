# Optional local quality gate (Gate 7). Enable with:
#   pip install pre-commit && pre-commit install
# Then `python tools/validate.py` runs automatically before each commit.
repos:
  - repo: local
    hooks:
      - id: conductor-validate
        name: conductor plugin invariants
        entry: python tools/validate.py
        language: system
        pass_filenames: false
        always_run: true
