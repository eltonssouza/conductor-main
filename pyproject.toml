[project]
name = "conductor"
version = "0.1.2"
description = "Software-development guidance plugin with 36 roles (Agents + Skills) anchored in reference books."
requires-python = ">=3.9"

# RAG is optional: the plugin (agents/skills/commands) works without deps.
# For semantic search over the library: pip install -e .[rag] + Ollama with bge-m3.
[project.optional-dependencies]
rag = ["chromadb>=1.5"]
