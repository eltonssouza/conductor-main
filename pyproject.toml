[project]
name = "conductor"
version = "0.1.0"
description = "Plugin orientador de desenvolvimento de software com 36 cargos (Agents + Skills) ancorados em livros de referência."
requires-python = ">=3.9"

# RAG é opcional: o plugin (agents/skills/commands) funciona sem deps.
# Para a busca semântica no acervo: pip install -e .[rag] + Ollama com bge-m3.
[project.optional-dependencies]
rag = ["chromadb>=1.5"]
