# Conductor RAG stack — Ollama + bge-m3 + ChromaDB + book ingest, all in Docker.
#
# Usage:
#   1. Put the books archive here as  infra/conductor/to-brain.7z
#   2. docker compose up                # attach to watch the progress
#      (or `up -d` then `docker compose logs -f conductor`)
#
# The `conductor` service runs once: it extracts the books, pulls bge-m3, waits
# for ChromaDB, and ingests — printing the progress of each step. It exits when
# the ingest finishes; ollama + chroma keep running to serve queries.
#
# Ports (localhost only): Ollama 11434, ChromaDB 8001 (8000 is left for Honcho).

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped
    # GPU is auto-enabled by `python -m rag.stack up` (detects NVIDIA GPU +
    # Docker runtime and adds docker-compose.gpu.yml). CPU ingest is slow.

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma:/data
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "127.0.0.1:8001:8000"
    # No healthcheck: the chromadb/chroma image has no `python`/`curl` on PATH to
    # probe with. The `conductor` service polls Chroma's heartbeat itself before
    # ingesting (see rag/bootstrap.step_chroma), so it waits correctly anyway.
    restart: unless-stopped

  conductor:
    build:
      context: ../..
      dockerfile: infra/conductor/Dockerfile
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
      CONDUCTOR_CHROMA_HTTP: chroma:8000
      CONDUCTOR_LIBRARY: /data/library
      CONDUCTOR_LIBRARY_ARCHIVE: /seed/to-brain.7z
      CONDUCTOR_EMBED_MODEL: bge-m3
    volumes:
      # Host path to the books archive. Default: infra/conductor/to-brain.7z.
      # Override for a different location, e.g. the repo root:
      #   CONDUCTOR_ARCHIVE=../../to-brain.7z docker compose up
      - ${CONDUCTOR_ARCHIVE:-./to-brain.7z}:/seed/to-brain.7z:ro
      - library:/data/library
    restart: "no"

volumes:
  ollama:
  chroma:
  library:
